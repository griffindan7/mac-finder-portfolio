<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Platformer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }
    #gameContainer {
      position: relative;
      width: 800px;
      height: 600px;
      background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
      border: 3px solid #333;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #333;
      font-size: 14px;
      z-index: 10;
    }
    .score { font-weight: bold; }
    .controls {
      margin-top: 20px;
      text-align: center;
      color: white;
      font-size: 14px;
    }
    .back-btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #555; }
    h1 {
      color: white;
      margin-bottom: 10px;
      font-size: 24px;
    }
  </style>
</head>
<body>

<h1>🎮 Portfolio Runner</h1>
<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div class="info">
    <div class="score">Coins: <span id="score">0</span></div>
  </div>
</div>
<div class="controls">
  ← → or A/D to move | SPACE to jump
</div>
<button class="back-btn" onclick="goBack()">← Back to Portfolio</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Player
const player = {
  x: 50,
  y: 400,
  width: 24,
  height: 32,
  velocityY: 0,
  velocityX: 0,
  jumping: false,
  speed: 5,
  jumpPower: 12,
  gravity: 0.5,
};

// Game state
let coins = 0;
let gameRunning = true;
const keys = {};

// Platforms
const platforms = [
  { x: 0, y: 550, width: 800, height: 50 }, // ground
  { x: 150, y: 480, width: 150, height: 20 },
  { x: 450, y: 450, width: 150, height: 20 },
  { x: 100, y: 380, width: 120, height: 20 },
  { x: 600, y: 380, width: 120, height: 20 },
  { x: 300, y: 300, width: 200, height: 20 },
  { x: 50, y: 220, width: 150, height: 20 },
  { x: 600, y: 250, width: 150, height: 20 },
];

// Coins
let coins_obj = [
  { x: 220, y: 450, width: 16, height: 16, collected: false },
  { x: 520, y: 420, width: 16, height: 16, collected: false },
  { x: 150, y: 350, width: 16, height: 16, collected: false },
  { x: 670, y: 350, width: 16, height: 16, collected: false },
  { x: 400, y: 270, width: 16, height: 16, collected: false },
  { x: 120, y: 190, width: 16, height: 16, collected: false },
  { x: 670, y: 220, width: 16, height: 16, collected: false },
];

// Input handling
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (!player.jumping) {
      player.velocityY = -player.jumpPower;
      player.jumping = true;
    }
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

function update() {
  // Horizontal movement
  player.velocityX = 0;
  if (keys['a'] || keys['arrowleft']) player.velocityX = -player.speed;
  if (keys['d'] || keys['arrowright']) player.velocityX = player.speed;

  player.x += player.velocityX;

  // Wrap around edges
  if (player.x + player.width < 0) player.x = canvas.width;
  if (player.x > canvas.width) player.x = -player.width;

  // Gravity
  player.velocityY += player.gravity;
  player.y += player.velocityY;

  // Platform collision
  let onPlatform = false;
  platforms.forEach(platform => {
    if (
      player.y + player.height >= platform.y &&
      player.y + player.height <= platform.y + platform.height + 5 &&
      player.x + player.width > platform.x &&
      player.x < platform.x + platform.width &&
      player.velocityY >= 0
    ) {
      player.y = platform.y - player.height;
      player.velocityY = 0;
      player.jumping = false;
      onPlatform = true;
    }
  });

  // Coin collection
  coins_obj.forEach(coin => {
    if (!coin.collected &&
        player.x + player.width > coin.x &&
        player.x < coin.x + coin.width &&
        player.y + player.height > coin.y &&
        player.y < coin.y + coin.height) {
      coin.collected = true;
      coins++;
      document.getElementById('score').textContent = coins;
    }
  });

  // Fall off screen
  if (player.y > canvas.height) {
    player.y = 400;
    player.velocityY = 0;
  }
}

function draw() {
  // Clear canvas
  ctx.fillStyle = 'rgba(135, 206, 235, 0.3)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw platforms
  ctx.fillStyle = '#8B4513';
  platforms.forEach(platform => {
    ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
    ctx.strokeStyle = '#654321';
    ctx.lineWidth = 2;
    ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
  });

  // Draw coins
  coins_obj.forEach(coin => {
    if (!coin.collected) {
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(coin.x + coin.width / 2, coin.y + coin.height / 2, coin.width / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#FFA500';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  });

  // Draw player
  ctx.fillStyle = '#FF6B6B';
  ctx.fillRect(player.x, player.y, player.width, player.height);
  ctx.fillStyle = '#000';
  ctx.fillRect(player.x + 6, player.y + 6, 4, 4); // left eye
  ctx.fillRect(player.x + 14, player.y + 6, 4, 4); // right eye
  ctx.fillRect(player.x + 8, player.y + 16, 8, 4); // smile
}

function gameLoop() {
  if (gameRunning) {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }
}

function goBack() {
  window.location.href = 'index.html';
}

gameLoop();
</script>

</body>
</html>
